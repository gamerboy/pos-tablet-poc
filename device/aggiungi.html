<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS 360 — Aggiungi telefono (tablet)</title>
<link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
<div class="tablet">

  <!-- HEADER -->
  <div class="header">
    <div class="appbar">
      <div class="platform">
        <img class="brandlogo" src="../assets/windtre-logo.svg" alt="WINDTRE">
        <img class="brandlogo-very" src="../assets/very-logo.svg" alt="Very Mobile">
        <span class="platform-name">POS<b> 360</b></span>
      </div>
      <nav class="navmenu">
        <a href="../index.html">Home</a>
        <a data-mega="Applicazioni">Applicazioni<svg class="navarrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M6 9l6 6 6-6"/></svg></a>
        <a data-mega="Attività">Attività<svg class="navarrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M6 9l6 6 6-6"/></svg></a>
      </nav>
      <div class="spacer"></div>
      <div class="appactions">
        <div class="item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>Webmail</div>
        <div class="item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M15 4h4v16h-4"/><path d="M10 8l-4 4 4 4"/><path d="M6 12h9"/></svg>Logout</div>
      </div>
    </div>
    <div class="subbar">
      <a class="back" href="../cliente/dettaglio.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M15 5l-7 7 7 7"/></svg>Torna al cliente</a>
      <span class="crumb">Aggiungi telefono</span>
      <div class="spacer"></div>
      <span class="modebadge">Tablet</span>
      <div class="op"><span class="av">LM</span>Marianeschi Luca</div>
    </div>
  </div>

  <!-- FLOW -->
  <div class="flow-main">
    <div class="flow-card" style="text-align:center;">
      <h2>Aggiungi telefono</h2>
      <div class="flow-ctx" style="margin-bottom:26px;">Inserisci l'IMEI e seleziona l'opzione, oppure sfoglia il catalogo col cliente.</div>
      <div style="display:flex;gap:12px;align-items:center;max-width:420px;margin:0 auto 24px;">
        <div class="search" style="flex:1;"><input type="text" placeholder="IMEI" style="text-align:left;"></div>
        <a class="btn btn--secondary" href="#">Verifica IMEI</a>
      </div>
      <div style="display:flex;align-items:center;gap:14px;color:var(--ink-500);font-size:12px;font-weight:600;max-width:420px;margin:0 auto 22px;">
        <span style="flex:1;height:1px;background:var(--ink-100);"></span>oppure<span style="flex:1;height:1px;background:var(--ink-100);"></span>
      </div>
      <a class="btn btn--primary btn--lg" href="catalogo.html">Catalogo telefoni</a>
    </div>
  </div>

</div>
<script src="../assets/menu.js"></script>
</body>
</html>
