<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS 360 — Nuova linea fissa · Copertura (tablet)</title>
<link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
<div class="tablet">

  <!-- HEADER -->
  <div class="header">
    <div class="appbar">
      <div class="platform">
        <img class="brandlogo" src="../assets/windtre-logo.svg" alt="WINDTRE">
        <img class="brandlogo-very" src="../assets/very-logo.svg" alt="Very Mobile">
        <span class="platform-name">POS<b> 360</b></span>
      </div>
      <nav class="navmenu">
        <a href="../index.html">Home</a>
        <a data-mega="Applicazioni">Applicazioni<svg class="navarrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M6 9l6 6 6-6"/></svg></a>
        <a data-mega="Attività">Attività<svg class="navarrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M6 9l6 6 6-6"/></svg></a>
      </nav>
      <div class="spacer"></div>
      <div class="appactions">
        <div class="item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>Webmail</div>
        <div class="item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M15 4h4v16h-4"/><path d="M10 8l-4 4 4 4"/><path d="M6 12h9"/></svg>Logout</div>
      </div>
    </div>
    <div class="subbar">
      <a class="back" href="../cliente/dettaglio.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M15 5l-7 7 7 7"/></svg>Torna al cliente</a>
      <span class="crumb">Nuova linea fissa</span>
      <div class="spacer"></div>
      <span class="modebadge">Tablet</span>
      <div class="op"><span class="av">LM</span>Marianeschi Luca</div>
    </div>
  </div>

  <!-- FLOW -->
  <div class="flow-main">
    <div class="stepper">
      <div class="step active"><span class="num">1</span>Copertura</div>
      <div class="step-sep"></div>
      <div class="step"><span class="num">2</span>Configurazione offerta</div>
      <div class="step-sep"></div>
      <div class="step locked"><span class="num">3</span>Completamento al fisso</div>
    </div>

    <div class="flow-card flow-card--wide">
      <h2>Verifica copertura</h2>
      <div class="flow-ctx">Nuova linea fissa · <b>Paolino Paperino</b></div>
      <div class="cov-grid">
        <div class="fld"><span class="l">Provincia</span><input class="in" value="RM (Roma)" readonly></div>
        <div class="fld"><span class="l">Città</span><input class="in" value="Roma" readonly></div>
        <div class="fld"><span class="l">CAP</span><input class="in" value="00184" readonly></div>
        <div class="fld"><span class="l">Indirizzo</span><input class="in" value="Via Cavour" readonly></div>
        <div class="fld"><span class="l">Numero civico</span><input class="in" value="10" readonly></div>
      </div>
      <div class="flow-actions">
        <a class="linkback" href="../cliente/dettaglio.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M15 5l-7 7 7 7"/></svg>Annulla</a>
        <a class="btn btn--primary" href="copertura-esito.html">Verifica copertura</a>
      </div>
    </div>
  </div>

</div>
<script src="../assets/menu.js"></script>
</body>
</html>
