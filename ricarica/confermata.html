<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POS 360 — Ricarica · Confermata (tablet)</title>
<link rel="stylesheet" href="../assets/styles.css">
</head>
<body>
<div class="tablet">

  <!-- HEADER -->
  <div class="header">
    <div class="appbar">
      <div class="platform">
        <img class="brandlogo" src="../assets/windtre-logo.svg" alt="WINDTRE">
        <img class="brandlogo-very" src="../assets/very-logo.svg" alt="Very Mobile">
        <span class="platform-name">POS<b> 360</b></span>
      </div>
      <nav class="navmenu">
        <a href="../index.html">Home</a>
        <a data-mega="Applicazioni">Applicazioni<svg class="navarrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M6 9l6 6 6-6"/></svg></a>
        <a data-mega="Attività">Attività<svg class="navarrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M6 9l6 6 6-6"/></svg></a>
      </nav>
      <div class="spacer"></div>
      <div class="appactions">
        <div class="item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>Webmail</div>
        <div class="item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M15 4h4v16h-4"/><path d="M10 8l-4 4 4 4"/><path d="M6 12h9"/></svg>Logout</div>
      </div>
    </div>
    <div class="subbar">
      <a class="back" href="../cliente/dettaglio.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M15 5l-7 7 7 7"/></svg>Torna al cliente</a>
      <span class="crumb">Ricarica</span>
      <div class="spacer"></div>
      <span class="modebadge">Tablet</span>
      <div class="op"><span class="av">LM</span>Marianeschi Luca</div>
    </div>
  </div>

  <!-- FLOW -->
  <div class="flow-main">
    <div class="flow-card">
      <div class="typ">
        <div class="typ-check"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M4 13l5 5L20 7"/></svg></div>
        <h2>Ricarica effettuata</h2>
        <p style="color:var(--ink-500);font-size:14px;">La ricarica è stata completata con successo.</p>
        <div class="recap">
          <div class="row"><span class="k">Numero</span><span class="v">329 9891209</span></div>
          <div class="row"><span class="k">Importo</span><span class="v">20,00 €</span></div>
          <div class="row"><span class="k">Pagamento</span><span class="v">Contactless (NFC)</span></div>
          <div class="row"><span class="k">Data e ora</span><span class="v">10/06/2026 · 11:24</span></div>
        </div>
        <div class="flow-actions" style="width:100%;">
          <a class="linkback" href="ricarica.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 12a9 9 0 109-9M3 12V7m0 5h5"/></svg>Nuova ricarica</a>
          <a class="btn btn--primary" href="../cliente/dettaglio.html">Torna al cliente</a>
        </div>
      </div>
    </div>
  </div>

</div>
<script src="../assets/menu.js"></script>
</body>
</html>
